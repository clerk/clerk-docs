# the schema that defines the shape of frontmatter
allOf:
  - properties:
      title:
        type: string
      description:
        type: string
      llmsText:
        type: object
        additionalProperties: false
        properties:
          include:
            type: boolean
            default: false
          section:
            oneOf:
              - type: string
                enum:
                  - Quick Start
                  - Guide
                  - Component
                  - Reference
              - type: boolean
                enum:
                  - true

    required:
      - title
      - description
